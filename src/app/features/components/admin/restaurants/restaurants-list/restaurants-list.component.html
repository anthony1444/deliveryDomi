<div class="container">
  <mat-card class="list-card">
    <mat-card-header>
      <mat-card-title>
        <mat-icon>restaurant</mat-icon>
        <span>Restaurantes Registrados</span>
      </mat-card-title>
      <mat-card-subtitle>Listado de restaurantes que pueden realizar pedidos en el sistema</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <div *ngIf="loading" class="spinner-container">
        <mat-spinner diameter="50"></mat-spinner>
      </div>

      <div class="table-container" *ngIf="!loading">
        <table mat-table [dataSource]="dataSource" class="full-width-table">
          
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let element">{{ element.name }}</td>
          </ng-container>

          <!-- Email Column -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let element">{{ element.email }}</td>
          </ng-container>

          <!-- Phone Column -->
          <ng-container matColumnDef="phone">
            <th mat-header-cell *matHeaderCellDef>Teléfono</th>
            <td mat-cell *matCellDef="let element">{{ element.phone }}</td>
          </ng-container>

          <!-- Tabulator Column -->
          <ng-container matColumnDef="tabulator">
            <th mat-header-cell *matHeaderCellDef>ID Tabulador</th>
            <td mat-cell *matCellDef="let element">
              <span class="badge">{{ element.tabulatorid || 'N/A' }}</span>
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let element">
              <button mat-icon-button color="warn" (click)="deleteRestaurant(element)" matTooltip="Eliminar restaurante">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *mat-header-row-def="displayedColumns"></tr>
          <tr mat-row *mat-row-def="let row; columns: displayedColumns;"></tr>
        </table>

        <div class="no-data" *ngIf="dataSource.data.length === 0">
          <mat-icon>info</mat-icon>
          <p>No se encontraron restaurantes registrados.</p>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
