<div class="home">
  <div class="wrapper">
    <mat-card appearance="outlined" class="card">
      <mat-card-content>

        <!-- Logo + brand -->
        <div class="brand">
          <svg class="brand-logo" viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg" aria-label="Servi App">
            <defs>
              <clipPath id="ll"><rect x="0"  y="0" width="44" height="88"/></clipPath>
              <clipPath id="lr"><rect x="44" y="0" width="44" height="88"/></clipPath>
            </defs>
            <circle cx="44" cy="44" r="42" fill="#FF6D00" clip-path="url(#ll)"/>
            <circle cx="44" cy="44" r="42" fill="#252B45" clip-path="url(#lr)"/>
            <circle cx="44" cy="44" r="42" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
            <line x1="44" y1="2" x2="44" y2="86" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
            <text x="22" y="58" font-family="'Plus Jakarta Sans',sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">S</text>
            <text x="66" y="58" font-family="'Plus Jakarta Sans',sans-serif" font-weight="900" font-size="36" fill="white" text-anchor="middle">E</text>
          </svg>
          <h1 class="brand-name">Servi App</h1>
          <p class="brand-tagline">Tu plataforma de domicilios en Medellín</p>
        </div>

        <div class="divider"></div>

        <!-- Email -->
        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Correo electrónico</mat-label>
          <mat-icon matPrefix>mail_outline</mat-icon>
          <input matInput type="email" [formControl]="email" autocomplete="email">
        </mat-form-field>

        <!-- Password -->
        <mat-form-field appearance="outline" class="form-field">
          <mat-label>Contraseña</mat-label>
          <mat-icon matPrefix>lock_outline</mat-icon>
          <input matInput [type]="showPassword ? 'text' : 'password'" [formControl]="password" autocomplete="current-password">
          <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword" class="toggle-pw">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <!-- Actions row -->
        <div class="otherActions">
          <a class="link-create" (click)="goToCreate()">
            ¿No tienes cuenta? <strong>Regístrate</strong>
          </a>
        </div>

        <button mat-flat-button class="btnLogin" (click)="login()">
          Iniciar sesión
        </button>

      </mat-card-content>
    </mat-card>
  </div>
</div>
