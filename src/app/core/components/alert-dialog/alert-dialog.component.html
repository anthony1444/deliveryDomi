<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
  <div *ngIf="data.timeout" class="countdown-container">
    <mat-progress-bar mode="determinate" [value]="progressValue" [color]="countdown <= 5 ? 'warn' : 'primary'"></mat-progress-bar>
    <span class="countdown-label" [class.urgent]="countdown <= 5">{{ countdown }}s</span>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button color="primary" (click)="close(true)">{{ data.confirmText }}</button>
  <button *ngIf="data.cancelText" mat-button (click)="close(false)">{{ data.cancelText }}</button>
</mat-dialog-actions>
